<label>Pilih Mode Cetak</label>
<select id="modeSelect">
  <option value="normal">Mode Laprak Otomatis</option>
  <option value="perfoto">Mode Pas Foto</option>
  <option value="circle">Mode Lingkaran</option>
</select>

<div id="circleControls" style="display:none;">
  <label>Diameter Lingkaran (cm)</label>
  <input id="circleDiameter" type="number" value="4">
</div>

<label>Ukuran Foto (cm)</label>
<select id="sizeSelect">
  <option value="2x3">2 x 3</option>
  <option value="3x4">3 x 4</option>
  <option value="4x6">4 x 6</option>
  <option value="5x5">5 x 5</option>
  <option value="6x9">6 x 9</option>
  <option value="10x15">10 x 15</option>
  <option value="custom">Custom</option>
</select>

<div id="customSize" style="display:none; gap:10px;">
  <input id="customW" type="number" placeholder="Lebar (cm)">
  <input id="customH" type="number" placeholder="Tinggi (cm)">
</div>

<label>Upload Foto</label>
<div id="dropArea" class="drop-area">Tarik foto ke sini / Klik Upload</div>
<input id="upload" type="file" multiple accept="image/*" hidden>

<label class="inline-check"><input type="checkbox" id="manualHargaCheckbox"> Gunakan Harga Manual</label>

<div id="manualHargaBox" style="display:none;">
  <label>Harga Manual (Rp)</label>
  <input id="manualHargaInput" type="number" value="500" min="500" step="500">
</div>

<label>Nama Pelanggan</label>
<input id="userName" type="text" placeholder="Nama pelanggan">


<div class="switch-wrap">
  <span>Sembunyikan Nama</span>
  <label class="switch">
    <input type="checkbox" id="hideInfo">
    <span class="slider"></span>
  </label>
</div>

<div class="price" id="priceDisplay">Harga: Rp 0</div>
<div id="batchList"></div>

<div class="accordion">

  <button type="button" class="accordion-btn" onclick="toggleMargin()">
    Margin Kertas ▼
  </button>

  <div id="marginSection" class="accordion-content">

    <label>Margin Atas (mm)</label>

    <input id="marginTop" type="number" value="10">

    <label>Margin Bawah (mm)</label>
    <input id="marginBottom" type="number" value="10">

    <label>Margin Kiri (mm)</label>
    <input id="marginLeft" type="number" value="10">

    <label>Margin Kanan (mm)</label>
    <input id="marginRight" type="number" value="10">

    <label>Gap antar foto (px)</label>
    <input id="gap" type="number" value="20">
 

  </div>

</div>
