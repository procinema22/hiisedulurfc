<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEDULUR FOTO COPY – Cetak Foto</title>

<link rel="icon" type="image/png" href="img/loggo/sdlr.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/cetak.css">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<!-- ===============================
     HEADER
================================ -->
<header>
  <div class="logo">
    <a href="index.html">
      <img src="img/loggo/sdlr.png" alt="Sedulur Foto Copy">
    </a>
  </div>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="cetakfoto.html" class="active">Cetak Foto</a></li>
    </ul>
  </nav>
</header>

<!-- ===============================
     MAIN LAYOUT
================================ -->
<div class="layout">

  <!-- ===========================
       LEFT PANEL
  ============================ -->
  <aside class="left-panel">

    <h2 class="section-title">Kolase Foto V4  </h2>

    <!-- MODE -->
    <label>Pilih Mode Cetak</label>
    <select id="modeSelect">
      <option value="normal">Mode Laprak Otomatis</option>
      <option value="perfoto">Mode Pas Foto</option>
      <option value="circle">Mode Lingkaran</option>
    </select>

    <!-- CIRCLE -->
    <div id="circleControls" style="display:none;">
      <label>Diameter Lingkaran (cm)</label>
      <input
        id="circleDiameter"
        type="number"
        value="4"
        min="1"
        step="0.1"
        placeholder="Diameter cm"
      >
    </div>

    <!-- SIZE -->
    <label>Ukuran Foto (cm)</label>
    <select id="sizeSelect">
      <option value="2x3">2 x 3</option>
      <option value="3x4">3 x 4</option>
      <option value="4x6">4 x 6</option>
      <option value="5x5">5 x 5</option>
      <option value="6x9">6 x 9</option>
      <option value="10x15">10 x 15</option>
      <option value="custom">Custom</option>
    </select>

    <!-- CUSTOM -->
    <div id="customSize" style="display:none; gap:10px;">
      <input id="customW" type="number" placeholder="Lebar (cm)">
      <input id="customH" type="number" placeholder="Tinggi (cm)">
    </div>

    <!-- UPLOAD -->
    <label>Upload Foto</label>
    <div id="dropArea" class="drop-area">
      Tarik foto ke sini / Klik Upload
    </div>
    <input
      id="upload"
      type="file"
      multiple
      accept="image/*"
      hidden
    >

 <!-- =========================
     HARGA SYSTEM
========================= -->

<label>
  Harga Dasar (Rp)
</label>

<input
  id="manualHargaInput"
  type="number"
  value="500"
  min="500"
  step="500"
>

<!-- SWITCH CUSTOM -->
<div class="switch-wrap">

  <span>
    Tambahan Custom
  </span>

  <label class="switch">

    <input
      type="checkbox"
      id="extraPriceCheckbox"
    >

    <span class="slider"></span>

  </label>

</div>

<!-- CUSTOM PRICE -->
<div
  id="extraPriceBox"
  style="display:none;"
>

  <label>
    Biaya Custom (+)
  </label>

  <input
    id="extraPriceInput"
    type="number"
    value="0"
    min="0"
    step="500"
  >

</div>
 
<!-- NAMA -->
<label>
  Nama Pelanggan
  <span style="color:red;">*</span>
</label>

<input
  type="text"
  id="userName"
  placeholder="Nama pelanggan"
/>

<small>
  Wajib diisi sebelum preview / buat kolase
</small>

<!-- HIDE NAME -->
<div class="switch-wrap">

  <span>
    Sembunyikan Nama
  </span>

  <label class="switch">

    <input
      type="checkbox"
      id="hideInfo"
    />

    <span class="slider"></span>

  </label>

</div>



    <!-- PRICE -->
    <div class="price" id="priceDisplay">
      Harga: Rp 0
    </div>

    <!-- BATCH -->
    <div id="batchList"></div>

  

<!-- =========================
     MARGIN SYSTEM
========================= -->

<!-- SWITCH MARGIN -->
<div class="switch-wrap">

  <span>
    Aktifkan Margin
  </span>

  <label class="switch">

    <input
      type="checkbox"
      id="enableMargin"
    >

    <span class="slider"></span>

  </label>

</div>

<!-- CUSTOM TEXT -->
<div
  id="customTextBox"
  style="display:none;"
>
<label>Ukuran Font</label>

<input
  type="number"
  id="fontSizeInput"
  value="38"
  min="10"
  max="100"
/>

  <label>
    Judul Atas
  </label>

  <input
    type="text"
    id="customTextInput"
    placeholder="Contoh: Laporan Praktikum"
    maxlength="40"
  >

</div>

<!-- ACCORDION -->
<div class="accordion">

  <button
    type="button"
    class="accordion-btn"
    onclick="toggleMargin()"
  >
    Margin Kertas ▼
  </button>

  <div
    id="marginSection"
    class="accordion-content"
  >

    <label>
      Margin Atas (mm)
    </label>

    <input
      id="marginTop"
      type="number"
      value="10"
    >

    <label>
      Margin Bawah (mm)
    </label>

    <input
      id="marginBottom"
      type="number"
      value="10"
    >

    <label>
      Margin Kiri (mm)
    </label>

    <input
      id="marginLeft"
      type="number"
      value="10"
    >

    <label>
      Margin Kanan (mm)
    </label>

    <input
      id="marginRight"
      type="number"
      value="10"
    >

    <label>
      Gap antar foto (px)
    </label>

    <input
      id="gap"
      type="number"
      value="20"
    >

  </div>

</div>

    <!-- WATERMARK -->
    <div class="switch-wrap">
      <span></span>
    
      <label class="switch">
        <input
          type="checkbox"
          checked
          disabled
        >
    

  </aside>

  <!-- ===========================
       CENTER PANEL
  ============================ -->
  <section class="center-panel">

    <canvas
      id="canvas"
      width="1240"
      height="1754"
    ></canvas>

    <div
      class="page-nav"
      id="pageNav"
      style="display:none;"
    >
      <button id="prevPage">⬅</button>

      <div id="pageIndicator">
        Halaman 1 / 1
      </div>

      <button id="nextPage">➡</button>
    </div>

  </section>

  <!-- ===========================
       RIGHT PANEL
  ============================ -->
  <aside class="right-panel">

    <h2 class="section-title">
      Aksi Cepat
    </h2>

    <button
      id="previewBtn"
      class="btn blue"
    >
      👁 Preview
    </button>

    <button
      id="generateBtn"
      class="btn green"
    >
      📄 Buat Kolase
    </button>

    <button
      id="downloadPdf"
      class="btn purple"
    >
      💾 Buka PDF
    </button>

    <button
      id="reset"
      class="btn red"
    >
      🔁 Reset
    </button>

  </aside>

</div>

<!-- ===============================
     LOADING
================================ -->
<div id="loadingOverlay">
  <div class="loader"></div>
  <p>Memproses... tunggu sebentar ya</p>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ===============================
     POPUP IOS
================================ -->
<div id="popupNotif" class="popup-notif">

  <div class="popup-card">

    <div class="popup-head">

      <div class="popup-left">
        <div class="popup-icon">💬</div>
        <span>MESSAGES</span>
      </div>

      <small>NOW</small>

    </div>

    <div
      class="popup-text"
      id="popupText"
    >
      Nama pelanggan wajib diisi
    </div>

  </div>
</div>

<!-- ===============================
     JS FILES
================================ -->
<script type="module" src="js/main.js"></script>

</body>
</html>
